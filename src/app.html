<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Glyphin</title>
		<!--
			Applies the saved theme before first paint so light-mode users never see a
			flash of the dark default. Blocking (no defer/async) on purpose: it must
			run before the first paint.

			Kept in a file rather than inline because the CSP has no 'unsafe-inline'
			in script-src, and SvelteKit only hashes the inline scripts it generates
			itself — not ones written into this template. See static/theme-init.js.
		-->
		<script src="%sveltekit.assets%/theme-init.js"></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
