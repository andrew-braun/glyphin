<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Confirm your Glyphin email</title>
	</head>
	<body
		style="
			margin: 0;
			background: #f6f1e7;
			color: #1f2a24;
			font-family: &quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif;
		"
	>
		<table
			role="presentation"
			width="100%"
			cellspacing="0"
			cellpadding="0"
			style="padding: 24px 0"
		>
			<tr>
				<td align="center">
					<table
						role="presentation"
						width="100%"
						cellspacing="0"
						cellpadding="0"
						style="
							max-width: 560px;
							background: #fffdf8;
							border: 1px solid #dfd3bd;
							border-radius: 18px;
							overflow: hidden;
						"
					>
						<tr>
							<td
								style="padding: 32px 32px 20px; background: #14342b; color: #fff8ea"
							>
								<p
									style="
										margin: 0;
										font-size: 14px;
										letter-spacing: 0.08em;
										text-transform: uppercase;
										opacity: 0.8;
									"
								>
									Glyphin
								</p>
								<h1 style="margin: 12px 0 0; font-size: 30px; line-height: 1.15">
									Confirm your email
								</h1>
							</td>
						</tr>
						<tr>
							<td style="padding: 28px 32px 32px">
								<p style="margin: 0 0 20px; font-size: 16px; line-height: 1.6">
									Confirm this email address to finish setting up your Glyphin
									account and start syncing your Thai reading progress.
								</p>
								<p style="margin: 0 0 20px">
									<a
										href="{{ .ConfirmationURL }}"
										style="
											display: inline-block;
											background: #e58d2d;
											border-radius: 999px;
											color: #1f160b;
											font-size: 15px;
											font-weight: 700;
											padding: 14px 22px;
											text-decoration: none;
										"
									>
										Confirm email address
									</a>
								</p>
								<p
									style="
										margin: 0;
										font-size: 13px;
										line-height: 1.6;
										color: #53635c;
									"
								>
									If you did not create a Glyphin account, you can safely ignore
									this email.
								</p>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
